<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Off - Sistema de Escala</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-corporativa">
        <div class="logo-area">
            <span class="logo-texto">SISTEMAS INTERNOS</span>
        </div>
        <div class="user-area">Produção</div>
    </header>
    <div class="linha-vermelha"></div>

    <main class="main-container">
        <div class="titulo-pagina">
            <h1>Gestão de Day Off</h1>
            <p>Agendamento e consulta de folgas da equipe de produção.</p>
        </div>
        
        <div class="card-formulario">
            <h2>Agendar Nova Folga</h2>
            <div class="input-group-vertical">
                <label for="nomeFuncionario">Funcionário</label>
                <select id="nomeFuncionario">
                    <option value="">Carregando lista...</option>
                </select>

                <label for="dataFolga">Data Pretendida</label>
                <input type="date" id="dataFolga">

                <button id="addBtn">AGENDAR FOLGA</button>
            </div>
        </div>

        <div id="listaItens"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
